<svg id="lyricdock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" class="scaled-icon">
                <defs>
                    <!-- macOS Standard Squircle clip-path -->
                    <clipPath id="squircle-clip">
                        <path d="M512,0 C880,0 1024,144 1024,512 C1024,880 880,1024 512,1024 C144,1024 0,880 0,512 C0,144 144,0 512,0 Z"/>
                    </clipPath>

                    <!-- Pure White Minimalist Background Gradient -->
                    <linearGradient id="bgBase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#FFFFFF"/>
                        <stop offset="100%" stop-color="#F2F2F7"/>
                    </linearGradient>

                    <!-- Vibrant Active Lyric Gradient (Apple Music vibe) -->
                    <linearGradient id="lyricAccent" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#FA233B"/>
                        <stop offset="100%" stop-color="#FF5B53"/>
                    </linearGradient>

                    <!-- Drop Shadows for Light Mode -->
                    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                        <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.06"/>
                    </filter>
                    
                    <!-- Soft Glow for the Active Lyric -->
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#FA233B" flood-opacity="0.25"/>
                    </filter>
                </defs>

                <!-- ================== ICON BACKGROUND ================== -->
                <g clip-path="url(#squircle-clip)">
                    <!-- Base White Canvas -->
                    <rect width="1024" height="1024" fill="url(#bgBase)"/>
                    
                    <!-- Inner 3D Edge (Crucial for white icons to stand out against white backgrounds) -->
                    <path d="M512,4 C878,4 1020,146 1020,512 C1020,878 878,1020 512,1020 C146,1020 4,878 4,512 C4,146 146,4 512,4 Z" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="8"/>
                    <path d="M512,12 C874,12 1012,150 1012,512 C1012,874 874,1012 512,1012 C150,1012 12,874 12,512 C12,150 150,12 512,12 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="8"/>

                    <!-- ================== PURE GEOMETRY (LYRICS) ================== -->
                    <g filter="url(#softShadow)">
                        <!-- Past Lyric (Fading out, displaced to left) -->
                        <rect x="160" y="240" width="320" height="64" rx="32" fill="#000000" opacity="0.06"/>
                        
                        <!-- Active Lyric (Center stage, dynamic gradient) -->
                        <g filter="url(#glow)">
                            <rect x="192" y="384" width="640" height="128" rx="64" fill="url(#lyricAccent)"/>
                        </g>
                        
                        <!-- Future Lyric (Fading in, displaced to right) -->
                        <rect x="384" y="592" width="480" height="64" rx="32" fill="#000000" opacity="0.1"/>
                    </g>

                    <!-- ================== MINIMAL DOCK INDICATOR ================== -->
                    <!-- A simple dash representing the foundation/Dock -->
                    <g filter="url(#softShadow)">
                        <rect x="362" y="820" width="300" height="16" rx="8" fill="#000000" opacity="0.15"/>
                    </g>
                </g>
            </svg>